<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dinosaur With Tiny Hands Jump</title>
    <link href="https://unpkg.com/material-components-web@latest/dist/material-components-web.min.css" rel="stylesheet">
    <link rel="stylesheet" href="dino.css">

</head>
<header>

  <h1 id="backToHome" style="cursor: pointer; pointer-events: auto;"></h1>Handy Game</h1>
  <h2>Dinosaur With Tiny Hands Jump</h2>

</header>

<body>

  <section id="demos" style="display: none;">
    <div id="liveView" class="videoView">
      <button id="webcamButton" class="mdc-button mdc-button--raised">
        <span class="mdc-button__label">ENABLE WEBCAM</span>
      </button>
      <div style="position: relative;">
        <video id="webcam" autoplay playsinline></video>
       
      </div>
    </div>
  </section>
  <div id="game-container">
    <canvas class="output_canvas" id="output_canvas"></canvas>
  </div>


  <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser-arcade-physics.min.js"></script>
  <script src="dinosourGame.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.1/hands.js" crossorigin="anonymous"></script>
  <script type="module" src="dinoApp.js"></script>
</body>
</html>
