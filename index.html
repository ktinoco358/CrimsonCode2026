<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Title Screen</title>
    <link href="https://unpkg.com/material-components-web@latest/dist/material-components-web.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
    <body>
        <header id="header">
            <h1>Handy Games</h1>
            <h2>keyboardless fun ig</h2>
        </header>

        <main> 
        
            <section id="info">
                <h1>All your action are controlled by your fingers, user your index to select a game and start playing</h1>
            </section>


            <section id ="selection">
                <button id="drawingGame" class="game-btn" >
                    <img src="assets/PG1.png" alt="Drawing-Game">
                </button>
                <button id="tRexGame" class="game-btn">
                    <img src="assets/DG.png" alt="T-Rex Game">
                </button>
                <button id="comingSoon" class="game-btn"> coming soon</button>
            </section>

        </main>


        <footer>
            <h1> check us out at n/a.com </h1>

        </footer>

        <section id="demos">
            <div id="liveView" class="videoView">
              <video id="webcam" autoplay playsinline></video>
              <canvas class="output_canvas" id="output_canvas"></canvas>
              <canvas id="ui_canvas" style="position: absolute; left: 0px; top: 0px;"></canvas>
            </div>
        </section>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.1/hands.js" crossorigin="anonymous"></script>
    <script type="module" src="app.js"></script>
    </body>
</html>
