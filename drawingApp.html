<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drawing App</title>
    <link href="https://unpkg.com/material-components-web@latest/dist/material-components-web.min.css" rel="stylesheet">
    <link rel="stylesheet" href="web.css">
</head>
<body>
  <header>
    <button id="homePage" class="game-btn">Handy Game</button>
    <h1">Microhand Paint</h1>
  </header>

  <section id="demos">
    <div id="liveView" class="videoView">

        <section id="toolbar">
          <div id="toolbarContent"></div>
            <div id="tools">
              <button id="pencil"></button>
              <button id="eraser"></button>
              <button id="clear"></button>
            </div>

            <div id="paintColors">
              <button id="c1"></button> <button id="c2"></button> <button id="c3"></button> <button id="c4"></button> 
              <button id="c5"></button> <button id="c6"></button> <button id="c7"></button> <button id="c8"></button> 
              <button id="c9"></button> <button id="c10"></button> <button id="c11"></button> <button id="c12"></button> 
              <button id="c13"></button> <button id="c14"></button> <button id="c15"></button> <button id="c16"></button> 
              <button id="c17"></button> <button id="c18"></button> <button id="c19"></button> <button id="c20"></button>
              <button id="c21"></button> <button id="c22"></button> <button id="c23"></button> <button id="c24"></button> 
              <button id="c25"></button> <button id="c26"></button> <button id="c27"></button> <button id="c28"></button>
            </div>

            <div id="brushes">
              <button id="circle"></button>
              <button id="triangle"></button>
              <button id="square"></button>
            </div>

          </div>


        </section>

        <div class="canvas-container">
            <video id="webcam" autoplay playsinline></video>
            <canvas class="output_canvas" id="output_canvas"></canvas>
            <canvas id="ui_canvas"></canvas>
        </div>



    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.1/hands.js" crossorigin="anonymous"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
